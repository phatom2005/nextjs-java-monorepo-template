services:
  # ---------------------------------------------
  # 1. DATABASE (PostgreSQL)
  # ---------------------------------------------
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD} # Nó sẽ lấy từ file .env
      POSTGRES_DB: MyProjectDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d MyProjectDb" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------
  # 2. BACKEND (.NET API)
  # ---------------------------------------------
  backend:
    build:
      context: ./project/backend # Trỏ vào thư mục backend
      dockerfile: ProjectTemplate-WebApp/ProjectTemplate-WebApp/Dockerfile # ĐƯỜNG DẪN NÀY QUAN TRỌNG: Sửa lại theo tên project API của bạn
    container_name: my_dotnet_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:8080" # Cổng 8080 là mặc định của .NET 8 trong Docker
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Tiêm chuỗi kết nối Database vào C#
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=MyProjectDb;Username=admin;Password=${DB_PASSWORD}

  # ---------------------------------------------
  # 3. FRONTEND (Next.js)
  # ---------------------------------------------
  frontend:
    build:
      context: ./project/frontend
      dockerfile: Dockerfile
    container_name: my_nextjs_frontend
    restart: always
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      # Báo cho Next.js biết Backend nằm ở đâu (gọi qua local host vì Next.js chạy cả phía client)
      - NEXT_PUBLIC_API_URL=http://localhost:5000

# Lưu lại dữ liệu Database để không mất khi tắt Docker
volumes:
  postgres_data:

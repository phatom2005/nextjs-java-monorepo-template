name: CI/CD Pipeline

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- JOB 1: KIỂM TRA BACKEND (.NET) ---
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Build Backend
        run: dotnet build project/backend/ProjectTemplate-WebApp/ProjectTemplate-WebApp.sln

  # --- JOB 2: KIỂM TRA FRONTEND (Next.js) ---
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: project/frontend/package-lock.json
      - name: Build Frontend
        run: |
          cd project/frontend
          npm ci
          npm run build

  # --- JOB 3: QUÉT BẢO MẬT (SNYK) ---
  security-scan:
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Snyk CLI
        uses: snyk/actions/setup@master # <-- Dùng bản setup để quét đa ngôn ngữ
      - name: Run Snyk Scan
        run: snyk test --all-projects # <-- Quét toàn bộ project con trong folder project
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # --- JOB 4: ĐÓNG GÓI & ĐẨY LÊN DOCKER HUB (CD) ---
  build-and-push:
    needs: [security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          # Context để ở Solution level để Docker thấy file .sln
          context: ./project/backend
          file: ./project/backend/ProjectTemplate-WebApp/ProjectTemplate-WebApp/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-backend:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./project/frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-frontend:latest